server {
    listen                  127.0.0.1:443 ssl;
    listen                  [::1]:443 ssl;
    ssl_certificate         /etc/letsencrypt/live/meztlikpak.dev/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/meztlikpak.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/meztlikpak.dev/chain.pem;

    server_name    opensign.meztlikpak.dev www.opensign.meztlikpak.dev;
    proxy_redirect off;
    http2          on;
    location / {
        proxy_pass http://localhost:3001;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        client_max_body_size 64M;

        proxy_pass http://localhost:8082/;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;

    # Redirect all traffic to HTTPS
    server_name opensign.meztlikpak.dev www.opensign.meztlikpak.dev;
    return 301 https://$host$request_uri;
}
