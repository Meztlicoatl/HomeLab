user nginx;

worker_processes 2;
worker_rlimit_nofile 65535;
include /etc/nginx/modules-enabled/*.conf;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

# HTTP / WEB SERVER CONTEXT
http {
    # --- Basic Optimizations ---
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    log_not_found off;
    types_hash_max_size 4096;

    # --- MIME Types ---
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- NAXSI Global Core Rules ---
    # This file is usually provided by the Naxsi package.
    include /etc/nginx/naxsi/naxsi_core.rules;

    # --- Size Limits & Timeouts (DDoS & Slowloris Mitigation) ---
    client_max_body_size 16M;
    client_body_buffer_size 128k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # --- Cloudflare Tunnel Real IP Resolution ---
    set_real_ip_from 127.0.0.1;
    set_real_ip_from ::1;
    real_ip_header CF-Connecting-IP;

    # --- Rate Limiting Zones (Applied per virtual host) ---
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    # --- SSL / TLS Settings (Hardened) ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # OCSP Stapling (Improves TLS handshake speed)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # --- Global Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=16k flush=2m;
    error_log /var/log/nginx/error.log warn;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- Modular Includes ---
    # Put your individual website configurations here
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}

# STREAM CONTEXT (Raw TCP/UDP Load Balancing & Proxying)
stream {
    # Stream Logging
    log_format stream_routing '$remote_addr [$time_local] '
                              'with $protocol to $upstream_addr '
                              '$status $bytes_sent $bytes_received '
                              '$session_time';
    access_log /var/log/nginx/stream-access.log stream_routing;
    error_log /var/log/nginx/stream-error.log;

    # Stream Module Includes
    # Put your individual TCP/UDP configurations here
    include /etc/nginx/stream.d/*.conf;
}

# MAIL CONTEXT (IMAP, POP3, SMTP Proxying)
mail {
    # Authentication endpoint for the mail proxy
    # Nginx needs to query an auth script to know where to route the mail client
    auth_http localhost:9000/auth;

    # Mail SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:MailSSL:10m;
    ssl_session_timeout 5m;

    # Mail Module Includes
    # Put your individual mail proxy configurations here
    include /etc/nginx/mail.d/*.conf;
}
