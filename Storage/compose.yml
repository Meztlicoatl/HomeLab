name: meztlikpak-storage

services:
  postgresql:
    container_name: meztlikpak-postgresql
    build:
      context: .
      dockerfile: postgresql.dockerfile
      args:
        - "IMAGE=${POSTGRESQL_IMAGE}"
    restart: unless-stopped
    env_file: ".env"
    volumes:
      - "postgresql-data:/var/lib/postgresql"
      - "./postgresql:/docker-entrypoint-initdb.d"
    ports:
      - "${HOST_IPV4}:${POSTGRESQL_HOST_PORT}:5432"
      - "${HOST_IPV6}:${POSTGRESQL_HOST_PORT}:5432"
    networks:
      - meztlikpak-storage
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    command: [
      "postgres",
      "-c", "shared_preload_libraries=pg_cron",
      "-c", "cron.database_name=${POSTGRES_DB}"
    ]
    shm_size: 512mb
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    container_name: meztlikpak-mongodb
    build:
      context: .
      dockerfile: mongodb.dockerfile
      args:
        - "IMAGE=${MONGODB_IMAGE}"
    restart: unless-stopped
    env_file: ".env"
    volumes:
      - "mongodb-configuration:/data/configdb"
      - "mongodb-data:/data/db"
      - "./mongodb:/docker-entrypoint-initdb.d"
    ports:
      - "${HOST_IPV4}:${MONGODB_HOST_PORT}:27017"
      - "${HOST_IPV6}:${MONGODB_HOST_PORT}:27017"
    networks:
      - meztlikpak-storage
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    command: [
      "mongod",
      "--bind_ip_all",
      "--wiredTigerCacheSizeGB", "1"
    ]
    shm_size: 512mb
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    container_name: meztlikpak-redis
    build:
      context: .
      dockerfile: redis.dockerfile
      args:
        - "IMAGE=${REDIS_IMAGE}"
    restart: unless-stopped
    env_file: ".env"
    volumes:
      - "redis-data:/data"
    ports:
      - "${HOST_IPV4}:${REDIS_HOST_PORT}:6379"
      - "${HOST_IPV6}:${REDIS_HOST_PORT}:6379"
    networks:
      - meztlikpak-storage
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  meztlikpak-storage:
    name: meztlikpak-storage
    driver: bridge

volumes:
  mongodb-configuration:
    name: meztlikpak-mongodb-configuration
    driver: local
  mongodb-data:
    name: meztlikpak-mongodb-data
    driver: local
  postgresql-data:
    name: meztlikpak-postgresql-data
    driver: local
  redis-data:
    name: meztlikpak-redis-data
    driver: local